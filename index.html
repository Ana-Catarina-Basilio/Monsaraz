<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0b0b12"/>
<title>Desafio Monsaraz → Cromeleque</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;font-family:system-ui;background:#000}
#map{height:100%;width:100%}

/* popup scaling */
.leaflet-popup.scaled-popup{
transform-origin:bottom center;
}

.leaflet-popup.scaled-popup .leaflet-popup-content-wrapper,
.leaflet-popup.scaled-popup .leaflet-popup-tip{
transform-origin:bottom center;
}

.leaflet-popup-pane{
z-index:2000!important;
}

/* marker */
.cp{
width:52px;height:52px;border-radius:18px;
display:grid;place-items:center;
background:white;
box-shadow:0 12px 26px rgba(0,0,0,.34);
position:relative;
}
.cp .emoji{font-size:22px}
.cp .num{
position:absolute;
bottom:-10px;
background:#111;
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:900;
}

.mission{min-width:min(320px,82vw)}
.tasks{display:grid;gap:10px}

.task{
background:#f2f2f2;
border-radius:14px;
padding:12px;
display:grid;
gap:10px;
}

.task button{
border:0;
border-radius:12px;
padding:12px;
font-weight:900;
cursor:pointer;
background:#111;
color:white;
}

.choiceBtn{
border:0;
border-radius:12px;
padding:12px;
font-weight:900;
background:#111;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const checkpoints=[
{
id:1,
emoji:"🏛️",
nome:"Cuba de Monsaraz",
coords:[38.4439079,-7.3792383],
tasks:[
{id:"1a",tipo:"check",titulo:"📸 Foto escadas",descricao:"Tira foto às escadas"},
{id:"1b",tipo:"check",titulo:"🎨 Sala pintada",descricao:"Encontra uma sala pintada"}
]
},
{
id:2,
emoji:"🎶",
nome:"Monumento ao Cante",
coords:[38.4419091,-7.3790447],
tasks:[
{id:"2a",tipo:"check",titulo:"🎥 Vídeo",descricao:"Grava um vídeo a cantar"}
]
}
]

const map=L.map("map",{zoomControl:true,tap:false}).setView([38.4436,-7.3780],16)

L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
{maxZoom:19}
).addTo(map)

function popupScaleForZoom(z){

if(z<=14)return .65
if(z==15)return .75
if(z==16)return .88
if(z==17)return .96

return 1
}

function applyPopupScale(){

const popup=document.querySelector(".leaflet-popup.scaled-popup")

if(!popup)return

const scale=popupScaleForZoom(map.getZoom())

popup.style.transform=`scale(${scale})`

}

map.on("zoomend",applyPopupScale)

function iconFor(cp){

return L.divIcon({
className:"",
html:`
<div class="cp">
<div class="emoji">${cp.emoji}</div>
<div class="num">#${cp.id}</div>
</div>
`,
iconSize:[52,52],
iconAnchor:[26,26]
})

}

checkpoints.forEach(cp=>{

const m=L.marker(cp.coords,{icon:iconFor(cp)}).addTo(map)

m.on("click",()=>openCheckpoint(cp,m))

})

function openCheckpoint(cp,marker){

const tasksHtml=cp.tasks.map(t=>{

return `
<div class="task">
<div><b>${t.titulo}</b></div>
<div>${t.descricao}</div>
<button>✅ Feito</button>
</div>
`

}).join("")

marker.bindPopup(`
<div class="mission">
<h3>${cp.emoji} #${cp.id} • ${cp.nome}</h3>
<div class="tasks">${tasksHtml}</div>
</div>
`,
{
maxWidth:460,
className:"scaled-popup"
}
).openPopup()

setTimeout(applyPopupScale,0)

}

</script>

</body>
</html>

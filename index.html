<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Desafio Monsaraz → Cromeleque</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:system-ui;
}

#map{
height:100%;
width:100%;
}

.task{
background:rgba(0,0,0,.05);
padding:12px;
border-radius:12px;
margin-top:10px;
}

button{
padding:10px;
border-radius:10px;
border:0;
cursor:pointer;
font-weight:700;
}

</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ---------------- CHECKPOINTS ---------------- */

const checkpoints=[

{
id:1,
emoji:"🏛️",
nome:"Cuba de Monsaraz",
coords:[38.4439079,-7.3792383],
tasks:[
{id:"1a",titulo:"📸 Foto escadas",descricao:"Tira foto às escadas"},
{id:"1b",titulo:"🎨 Sala pintada",descricao:"Encontra sala pintada"}
]
},

{
id:2,
emoji:"🎶",
nome:"Monumento ao Cante",
coords:[38.4419091,-7.3790447],
tasks:[
{id:"2a",titulo:"🎤 Cantar",descricao:"Canta um excerto"}
]
},

{
id:3,
emoji:"🔐",
nome:"Ermida de São Lázaro",
coords:[38.4423191,-7.3759452],
tasks:[
{id:"3a",tipo:"cipher",titulo:"🧭 Geo-cache: decifra",descricao:"Resolve o enigma para descobrir onde procurar"}
]
},

{
id:4,
emoji:"🧠",
nome:"Forca de Monsaraz",
coords:[38.4418690,-7.3726297],
tasks:[
{id:"4a",titulo:"Adivinha",descricao:"O que existia aqui?"}
]
},

{
id:5,
emoji:"🏺",
nome:"Santa Catarina",
coords:[38.4446694,-7.3716495],
tasks:[
{id:"5a",titulo:"Sabias que",descricao:"Aqui havia villa romana"}
]
},

{
id:6,
emoji:"🪨",
nome:"Cromeleque do Xerez",
coords:[38.4534007,-7.3710054],
tasks:[
{id:"6a",titulo:"Conta menires",descricao:"Quantos menires?"}
]
}

];

/* ---------------- MAPA ---------------- */

const map=L.map("map").setView([38.4436,-7.378],16);

L.tileLayer(
"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
).addTo(map);

const markers={};

checkpoints.forEach(cp=>{

let m=L.marker(cp.coords).addTo(map);

markers[cp.id]=m;

m.on("click",()=>openCheckpoint(cp,m));

});

/* ---------------- ERMIDA PUZZLE ---------------- */

function cipherBlock(){

return`

<div class="task">

<div style="font-weight:900;">🧭 Desafio da Ermida</div>

<div style="font-size:14px;margin-top:6px;">
Perto da ermida existe um esconderijo.
Para o encontrar tens de descobrir uma palavra.
</div>

<div style="margin-top:10px;">
<b>Pista 1</b><br>
A palavra está escondida neste código:
</div>

<div style="font-size:22px;font-weight:900;margin-top:6px;">
Ebpun
</div>

<div style="margin-top:10px;">
<b>Pista 2</b><br>
Cada letra foi trocada pela letra que está <b>13 lugares à frente no alfabeto</b>.
</div>

<div style="margin-top:10px;">
<b>Pista 3</b><br>
A primeira letra é <b>R</b>.
</div>

<div style="margin-top:10px;">
<b>Pista 4</b><br>
É algo que existe mesmo perto da ermida.
</div>

</div>

<div class="task">

<div style="font-weight:900;">Resposta</div>

<input id="cipherInput"
placeholder="Escreve a palavra..."
style="padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;margin-top:8px;">

<button id="cipherBtn" style="margin-top:10px;">🔓 Validar</button>

<div id="cipherMsg" style="margin-top:8px;font-size:13px;"></div>

</div>

`;

}

/* ---------------- POPUP ---------------- */

function openCheckpoint(cp,marker){

let tasksHTML="";

cp.tasks.forEach(t=>{

let extra="";

if(t.tipo==="cipher"){
extra=cipherBlock();
}

tasksHTML+=`

<div class="task">

<div><b>${t.titulo}</b></div>

<div>${t.descricao}</div>

${extra}

</div>

`;

});

marker.bindPopup(`

<div style="min-width:260px">

<h3>${cp.emoji} ${cp.nome}</h3>

${tasksHTML}

</div>

`).openPopup();

setTimeout(()=>{

const cipherBtn=document.getElementById("cipherBtn");

if(cipherBtn){

cipherBtn.onclick=()=>{

let val=document
.getElementById("cipherInput")
.value
.trim()
.toUpperCase();

let msg=document.getElementById("cipherMsg");

if(val==="ROCHA"){

msg.innerHTML="✅ Boa! Agora procura a geo-cache perto da rocha.";

}else{

msg.innerHTML="❌ Ainda não. Repara nas pistas.";

}

};

}

},0);

}

</script>

</body>
</html>
